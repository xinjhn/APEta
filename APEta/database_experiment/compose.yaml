name: ape-database-experiment

services:
  mongodb:
    image: mongo:8.0.26
    container_name: ape-db-mongodb
    command: ["mongod", "--bind_ip_all", "--wiredTigerCacheSizeGB", "0.5"]
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ping:1}).ok"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s

  neo4j:
    image: neo4j:5.26.28-community
    container_name: ape-db-neo4j
    environment:
      NEO4J_AUTH: neo4j/ape-experiment
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_dbms_usage__report_enabled: "false"
    ports:
      - "127.0.0.1:7475:7474"
      - "127.0.0.1:7688:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ape-experiment 'RETURN 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s

  postgresql:
    image: postgres:18.4
    container_name: ape-db-postgresql
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - compute_query_id=on
      - -c
      - track_io_timing=on
      - -c
      - pg_stat_statements.track_planning=on
    environment:
      POSTGRES_USER: ape
      POSTGRES_PASSWORD: ape-experiment
      POSTGRES_DB: ape_db_experiment
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ape -d ape_db_experiment"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s

volumes:
  mongo_data:
  neo4j_data:
  postgres_data:
